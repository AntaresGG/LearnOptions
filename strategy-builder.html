<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Options Strategy Builder | 期权学堂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== Strategy Builder · 「Quant Desk」独立配色 · 满宽单屏 ===== */
:root{
  --bg:#0b0c11; --panel:#13141c; --panel2:#1a1c27; --panel3:#23253250;
  --border:#2a2c3a; --border-soft:#20222e;
  --text:#e7e9f1; --muted:#888da3; --faint:#565b70;
  --accent:#a78bfa; --accent2:#7c6df2; --accent-soft:rgba(167,139,250,.14);
  --call:#5aa2ff;   /* Call 认购 */
  --put:#ffb454;    /* Put  认沽 */
  --up:#ff5b6e;     /* 盈利 / 上涨 (红涨) */
  --down:#22c98b;   /* 亏损 / 下跌 (绿跌) */
  --mono:"JetBrains Mono","SFMono-Regular",Consolas,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;
  overflow:hidden;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 60% 50% at 100% 0,rgba(124,109,242,.10),transparent 60%);
}
.mono{font-family:var(--mono)}
button,select,input{font-family:inherit}

/* ---- appbar ---- */
.appbar{height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;border-bottom:1px solid var(--border-soft);background:var(--panel)}
.brand{display:flex;align-items:baseline;gap:13px}
.brand h1{font-size:16px;font-weight:600;letter-spacing:.2px}
.brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.34em;color:var(--accent);
  border:1px solid var(--border);border-radius:5px;padding:2px 8px}
.appbar .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint)}
.appbar .meta b{color:var(--muted);font-weight:500}

/* ---- shell: 左控制 / 右图表 ---- */
.app{height:calc(100vh - 54px);display:grid;grid-template-columns:404px 1fr}
.panel{border-right:1px solid var(--border-soft);overflow-y:auto;padding:16px 16px 26px}
.panel::-webkit-scrollbar{width:8px}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.stage{display:flex;flex-direction:column;min-width:0;padding:15px 20px 16px}

/* ---- panel blocks ---- */
.blk{margin-bottom:18px}
.blk-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.blk-h .no{font-family:var(--mono);font-size:11px;color:var(--accent);
  border:1px solid var(--border);border-radius:5px;padding:1px 6px}
.blk-h h2{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}

.row{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.row .lab{font-size:11px;color:var(--faint);width:50px;flex:none;padding-top:6px}

/* segmented */
.seg{display:inline-flex;flex-wrap:wrap;gap:6px}
.seg button{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);
  border-radius:7px;padding:5px 10px;cursor:pointer;transition:.12s}
.seg button:hover{border-color:var(--accent);color:var(--text)}
.seg button.active{background:var(--accent);border-color:var(--accent);color:#16121f;font-weight:600}

/* reco */
.reco{margin-top:11px;background:var(--panel2);border:1px solid var(--border);
  border-left:3px solid var(--accent);border-radius:9px;padding:11px 13px}
.reco .rk{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
.reco .rn{font-size:14px;font-weight:600;margin:4px 0 5px}
.reco .rd{font-size:11.5px;color:var(--muted);line-height:1.55}
.reco .ralt{font-size:11px;color:var(--faint);margin-top:7px}
.reco .ralt b{color:var(--text);font-weight:500}

/* gallery */
.gal{display:flex;flex-wrap:wrap;gap:5px}
.galcat{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gc,#888da3);margin:8px 0 1px}
.gal button{font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border-soft);
  border-radius:6px;padding:3px 8px;cursor:pointer;transition:.12s}
.gal button:hover{border-color:var(--accent);color:var(--text)}
.gal button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--text);font-weight:500}

/* sliders */
.ctrl{margin-bottom:11px}
.ctrl label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:6px}
.ctrl .val{font-family:var(--mono);color:var(--accent)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;background:#23253a;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--accent)}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}

/* leg editor */
.leghead,.legrow{display:grid;grid-template-columns:1fr 1fr 58px 42px 20px;gap:6px;align-items:center}
.leghead{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;padding:0 2px 4px}
.leghead span:nth-child(3),.leghead span:nth-child(4){text-align:right}
.legrow{margin-bottom:6px}
.legrow select,.legrow input{font-size:11.5px;color:var(--text);background:var(--panel2);
  border:1px solid var(--border);border-radius:6px;padding:5px 6px;width:100%}
.legrow select:focus,.legrow input:focus{border-color:var(--accent);outline:none}
.legrow input{font-family:var(--mono);text-align:right}
.legrow input:disabled{opacity:.35}
.legrow .del{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:15px;line-height:1;padding:0}
.legrow .del:hover{color:var(--up)}
.addleg{margin-top:4px;font-size:11.5px;color:var(--accent);background:transparent;border:1px dashed var(--border);
  border-radius:7px;padding:7px;width:100%;cursor:pointer;transition:.12s}
.addleg:hover{border-color:var(--accent);background:var(--accent-soft)}

/* ---- stage ---- */
.stage-h{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;margin-bottom:4px}
.stage-h .nm{font-size:18px;font-weight:600}
.stage-h .vw{font-family:var(--mono);font-size:12px;color:var(--put)}
.stage-note{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px}
.chart-wrap{flex:1 1 auto;min-height:0;position:relative}
.chart-wrap canvas{display:block;width:100%}
.legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin:5px 0 11px}
.legend i{display:inline-block;width:13px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}
.legend .dot{width:8px;height:8px;border-radius:50%}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.metric{background:var(--panel);border:1px solid var(--border-soft);border-radius:10px;padding:11px 13px}
.metric .k{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.metric .v{font-family:var(--mono);font-size:18px;font-weight:500}
.metric .v.sm{font-size:14px}
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <h1>Options Strategy Builder</h1>
    <span class="tag">STRATEGY · BUILDER</span>
  </div>
  <div class="meta">权利金 Black-Scholes 估算 · <b>S₀=100</b> · <b>r=2%</b> · 仅教育演示</div>
</header>

<main class="app">
  <!-- ===== 左：控制栏 ===== -->
  <aside class="panel">

    <div class="blk">
      <div class="blk-h"><span class="no">①</span><h2>按场景选型</h2></div>
      <div class="row"><span class="lab">市场判断</span>
        <div class="seg" id="mView">
          <button class="active" data-v="强烈看涨">强烈看涨</button>
          <button data-v="温和看涨">温和看涨</button>
          <button data-v="强烈看跌">强烈看跌</button>
          <button data-v="温和看跌">温和看跌</button>
          <button data-v="震荡">震荡 / 区间</button>
          <button data-v="大涨大跌">大涨大跌</button>
        </div>
      </div>
      <div class="row"><span class="lab">波动率</span>
        <div class="seg" id="mIV">
          <button class="active" data-v="低">IV 低(便宜)</button>
          <button data-v="高">IV 高(昂贵)</button>
        </div>
      </div>
      <div class="reco" id="reco"></div>
    </div>

    <div class="blk">
      <div class="blk-h"><span class="no">②</span><h2>策略图鉴</h2></div>
      <div class="gal" id="gallery"></div>
    </div>

    <div class="blk">
      <div class="blk-h"><span class="no">③</span><h2>定价参数</h2></div>
      <div class="ctrl"><label><span>波动率 σ</span><span class="val" id="vV">30%</span></label>
        <input type="range" id="rV" min="10" max="70" step="1" value="30"></div>
      <div class="ctrl"><label><span>剩余天数 T</span><span class="val" id="vT">60 天</span></label>
        <input type="range" id="rT" min="7" max="365" step="1" value="60"></div>
    </div>

    <div class="blk">
      <div class="blk-h"><span class="no">④</span><h2>腿编辑器</h2></div>
      <div class="leghead"><span>类型</span><span>方向</span><span>行权价 K</span><span>数量</span><span></span></div>
      <div id="legs"></div>
      <button class="addleg" id="addLeg">＋ 加一条腿</button>
    </div>

  </aside>

  <!-- ===== 右：图表 ===== -->
  <section class="stage">
    <div class="stage-h"><span class="nm" id="sName">—</span><span class="vw" id="sView"></span></div>
    <p class="stage-note" id="sNote"></p>
    <div class="chart-wrap"><canvas id="cv"></canvas></div>
    <div class="legend">
      <span><i style="background:var(--accent)"></i>到期损益</span>
      <span><i style="background:var(--muted)"></i>盈亏平衡线</span>
      <span><i class="dot" style="background:var(--accent2)"></i>当前 S₀=100</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="k">净成本 / 收入</div><div class="v" id="mNet">—</div></div>
      <div class="metric"><div class="k">盈亏平衡点</div><div class="v sm" id="mBe">—</div></div>
      <div class="metric"><div class="k">最大盈利</div><div class="v" id="mMp" style="color:var(--up)">—</div></div>
      <div class="metric"><div class="k">最大亏损</div><div class="v" id="mMl" style="color:var(--down)">—</div></div>
    </div>
  </section>
</main>

<script>
/* ===== OA · Black-Scholes + canvas chart 子集（取自 strategy-system.html，仅保留 builder 所需） ===== */
(function(){
'use strict';
const A = window.OA = {};
A.ndf = x => Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);
A.ncdf = function(x){
  const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;
  const s = x<0?-1:1; x = Math.abs(x)/Math.SQRT2;
  const t = 1/(1+p*x);
  const y = 1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return .5*(1+s*y);
};
A.bs = function(type,S,K,T,r,sig,q){
  q = q||0;
  if(T<=0 || sig<=0){
    const intr = type==='call'?Math.max(S-K,0):Math.max(K-S,0);
    const dl = type==='call'?(S>K?1:0):(S<K?-1:0);
    return {price:intr,delta:dl,gamma:0,theta:0,vega:0,rho:0,d1:0,d2:0};
  }
  const sq=Math.sqrt(T), eq=Math.exp(-q*T), er=Math.exp(-r*T);
  const d1=(Math.log(S/K)+(r-q+sig*sig/2)*T)/(sig*sq), d2=d1-sig*sq;
  const N1=A.ncdf(d1),N2=A.ncdf(d2),n1=A.ndf(d1);
  let price,delta,rho,theta;
  if(type==='call'){
    price=S*eq*N1-K*er*N2; delta=eq*N1; rho=K*T*er*N2/100;
    theta=(-S*eq*n1*sig/(2*sq)-r*K*er*N2+q*S*eq*N1)/365;
  }else{
    price=K*er*A.ncdf(-d2)-S*eq*A.ncdf(-d1); delta=-eq*A.ncdf(-d1); rho=-K*T*er*A.ncdf(-d2)/100;
    theta=(-S*eq*n1*sig/(2*sq)+r*K*er*A.ncdf(-d2)-q*S*eq*A.ncdf(-d1))/365;
  }
  const gamma=eq*n1/(S*sig*sq); const vega=S*eq*n1*sq/100;
  return {price,delta,gamma,theta,vega,rho,d1,d2};
};
A.fmt = (x,d)=> (x==null||isNaN(x))?'–':x.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});

A.chart = function(canvas,opts){
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const cssW=canvas.clientWidth||620;
  const cssH=opts.height||320;
  canvas.style.height=cssH+'px';
  canvas.width=cssW*dpr; canvas.height=cssH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cssW,cssH);
  const ml=opts.ylabel?54:44, mr=16, mt=14, mb=opts.xlabel?40:30;
  const W=cssW-ml-mr, H=cssH-mt-mb;
  let ymin=opts.ymin, ymax=opts.ymax;
  if(ymin==null||ymax==null){
    let lo=Infinity,hi=-Infinity;
    opts.series.forEach(s=>s.points.forEach(p=>{if(isFinite(p[1])){lo=Math.min(lo,p[1]);hi=Math.max(hi,p[1]);}}));
    if(!isFinite(lo)){lo=-1;hi=1;}
    if(opts.baseline!=null){lo=Math.min(lo,opts.baseline);hi=Math.max(hi,opts.baseline);}
    const pad=(hi-lo)*(opts.padFrac||.12)||1;
    ymin=ymin==null?lo-pad:ymin; ymax=ymax==null?hi+pad:ymax;
    if(ymin===ymax){ymin-=1;ymax+=1;}
  }
  const xmin=opts.xmin,xmax=opts.xmax;
  const X=x=>ml+(x-xmin)/(xmax-xmin)*W;
  const Y=y=>mt+H-(y-ymin)/(ymax-ymin)*H;
  ctx.font='11px '+getComputedStyle(document.body).getPropertyValue('--mono');
  const cs=getComputedStyle(document.documentElement);
  const cBorder=cs.getPropertyValue('--border').trim();
  const cMuted=cs.getPropertyValue('--muted').trim();
  const cFaint=cs.getPropertyValue('--faint').trim();
  const nx=opts.xticks||6, ny=opts.yticks||5;
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let i=0;i<=nx;i++){
    const xv=xmin+(xmax-xmin)*i/nx, px=X(xv);
    ctx.strokeStyle=cBorder; ctx.globalAlpha=.4; ctx.beginPath();
    ctx.moveTo(px,mt); ctx.lineTo(px,mt+H); ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillStyle=cFaint; ctx.fillText(A.fmt(xv,xv%1===0?0:(Math.abs(xv)<10?1:0)),px,mt+H+7);
  }
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let i=0;i<=ny;i++){
    const yv=ymin+(ymax-ymin)*i/ny, py=Y(yv);
    ctx.strokeStyle=cBorder; ctx.globalAlpha=.4; ctx.beginPath();
    ctx.moveTo(ml,py); ctx.lineTo(ml+W,py); ctx.stroke(); ctx.globalAlpha=1;
    ctx.fillStyle=cFaint; ctx.fillText(A.fmt(yv,Math.abs(ymax-ymin)<5?2:(Math.abs(ymax-ymin)<50?1:0)),ml-7,py);
  }
  if(opts.baseline!=null && opts.baseline>=ymin && opts.baseline<=ymax){
    ctx.strokeStyle=cMuted; ctx.globalAlpha=.6; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(ml,Y(opts.baseline)); ctx.lineTo(ml+W,Y(opts.baseline)); ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.save(); ctx.beginPath(); ctx.rect(ml,mt,W,H); ctx.clip();
  opts.series.forEach(s=>{
    if(!s.fill)return;
    ctx.beginPath(); let started=false;
    s.points.forEach(p=>{if(!isFinite(p[1]))return; if(!started){ctx.moveTo(X(p[0]),Y(p[1]));started=true;}else ctx.lineTo(X(p[0]),Y(p[1]));});
    const last=s.points[s.points.length-1],first=s.points[0];
    const by=opts.baseline!=null?Y(opts.baseline):mt+H;
    ctx.lineTo(X(last[0]),by); ctx.lineTo(X(first[0]),by); ctx.closePath();
    ctx.fillStyle=s.fill; ctx.fill();
  });
  opts.series.forEach(s=>{
    ctx.strokeStyle=s.color; ctx.lineWidth=s.width||2.4; ctx.setLineDash(s.dash||[]);
    ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath(); let started=false;
    s.points.forEach(p=>{if(!isFinite(p[1]))return; const px=X(p[0]),py=Y(p[1]); if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);});
    ctx.stroke(); ctx.setLineDash([]);
  });
  (opts.vlines||[]).forEach(v=>{
    if(v.x<xmin||v.x>xmax)return;
    ctx.strokeStyle=v.color; ctx.lineWidth=1.4; ctx.setLineDash(v.dash||[4,4]);
    ctx.beginPath();ctx.moveTo(X(v.x),mt);ctx.lineTo(X(v.x),mt+H);ctx.stroke();ctx.setLineDash([]);
    if(v.label){ctx.restore();ctx.save();ctx.fillStyle=v.color;ctx.font='11px '+cs.getPropertyValue('--mono');ctx.textAlign='center';ctx.textBaseline='bottom';
      const tx=Math.min(Math.max(X(v.x),ml+22),ml+W-22);ctx.fillText(v.label,tx,mt+11);ctx.beginPath();ctx.rect(ml,mt,W,H);ctx.clip();}
  });
  ctx.restore();
  if(opts.xlabel){ctx.fillStyle=cMuted;ctx.font='12px '+cs.getPropertyValue('--sans');ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(opts.xlabel,ml+W/2,cssH-2);}
  if(opts.ylabel){ctx.save();ctx.translate(12,mt+H/2);ctx.rotate(-Math.PI/2);ctx.fillStyle=cMuted;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(opts.ylabel,0,0);ctx.restore();}
};
A.sample = function(a,b,n,fn){const pts=[];for(let i=0;i<=n;i++){const x=a+(b-a)*i/n;pts.push([x,fn(x)]);}return pts;};
A.slider = function(rangeId,valId,fmt,onInput){
  const r=document.getElementById(rangeId), v=valId?document.getElementById(valId):null;
  const upd=()=>{ if(v) v.textContent=fmt(parseFloat(r.value)); onInput(parseFloat(r.value)); };
  r.addEventListener('input',upd); upd(); return r;
};
A.seg = function(containerId,onChange){
  const c=document.getElementById(containerId);
  c.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    c.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); onChange(b.dataset.v,b);
  }));
};
A._redraws=[];
A.onResize = fn=>{A._redraws.push(fn);};
let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>A._redraws.forEach(f=>f()),120);});
})();
</script>

<script>
/* ===== Strategy Builder · 页面逻辑 ===== */
const O=window.OA; const S0=100, r=0.02;
let V=0.30, T=60;            // 由滑块驱动
let legs=[];                 // 当前组合：[{kind:'call'|'put'|'stock', dir:±1, K, qty}]
let curKey=null;             // 选中的预设策略 key；手动编辑后置 null
let mView='强烈看涨', mIV='低';
const cv=document.getElementById('cv');

/* 单腿权利金（call/put 用 BS，stock 用 S0） */
function premium(l){ return l.kind==='stock'?S0:O.bs(l.kind,S0,l.K,T/365,r,V).price; }
/* 到期日单腿内在价值 */
function legVal(l,S){
  if(l.kind==='stock') return S;
  return l.kind==='call'?Math.max(S-l.K,0):Math.max(l.K-S,0);
}

/* ----- 四大家族 ----- */
const CAT={
  dir:{t:'Directional · 方向性',c:'#5aa2ff'},
  vol:{t:'Volatility · 波动率',c:'#ffb454'},
  inc:{t:'Income · 收益增强',c:'#ff5b6e'},
  risk:{t:'Risk-Control · 风险控制',c:'#22c98b'}
};

/* ----- 策略库（取自 strategy-system.html，剔除需双到期日的 calendar）-----
   legs 仅含 {kind,dir,K,qty}，权利金在 render 时按当前 σ/T 现算 */
const op=(kind,dir,K,qty)=>({kind,dir,K,qty:qty||1});
const st=(dir)=>({kind:'stock',dir,K:0,qty:1});
const DEF={
  /* Directional */
  longcall:{cn:'买入认购',en:'Long Call',cat:'dir',view:'强烈看涨 · IV 低更划算',

    legs:[op('call',-1,100),op('call',1,115)],
    note:'卖低行权 Call、买高行权 Call。净收权利金,标的不涨破即获利,亏损被买入腿封顶。'},

    legs:[op('put',1,90),op('put',-1,100),op('call',-1,100),op('call',1,110)],

  protectiveput:{cn:'保护性认沽',en:'Protective Put',cat:'risk',view:'持股避险 · 给多头买保险',

const ORDER={dir:[],vol:[],inc:[],risk:[]};
Object.keys(DEF).forEach(k=>ORDER[DEF[k].cat].push(k));

/* market × IV -> 推荐策略 + 备选（calendar 已剔除，震荡|低 改荐 butterfly） */
const MX={
  '强烈看涨|低':{k:'longcall',alt:['LEAPS Call(长期看涨)']},
  '强烈看涨|高':{k:'bullcall',alt:['Call Backspread(预期突破)']},
  '温和看涨|低':{k:'coveredcall',alt:['Bull Call Spread']},
  '温和看涨|高':{k:'bullput',alt:['Covered Call']},
  '强烈看跌|低':{k:'longput',alt:['LEAPS Put(长期看跌)']},
  '强烈看跌|高':{k:'bearput',alt:['Put Backspread(预期暴跌)']},
  '温和看跌|低':{k:'bearput',alt:['Bear Call Spread']},
  '温和看跌|高':{k:'bearcall',alt:['Bear Put Spread']},
  '震荡|低':{k:'butterfly',alt:['Iron Condor']},
  '震荡|高':{k:'ironcondor',alt:['Iron Butterfly','Short Strangle']},
  '大涨大跌|低':{k:'longstraddle',alt:['Long Strangle','Call Backspread']},
  '大涨大跌|高':{k:'callbackspread',alt:['IV 偏贵,买入波动性价比低;可用 Backspread 或等 IV 回落']}
};

/* ----- 图鉴 ----- */
(function(){
  const g=document.getElementById('gallery'); let html='';
  ['dir','vol','inc','risk'].forEach(cat=>{
    html+='<div class="galcat" style="--gc:'+CAT[cat].c+'">'+CAT[cat].t+'</div>';
    ORDER[cat].forEach(k=>{ html+='<button data-k="'+k+'">'+DEF[k].en+'</button>'; });
  });
  g.innerHTML=html;
  g.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>loadStrategy(b.dataset.k)));
})();
function syncGallery(){
  document.querySelectorAll('#gallery button').forEach(b=>b.classList.toggle('on',b.dataset.k===curKey));
}

/* ----- 载入预设策略 ----- */
function loadStrategy(key){
  curKey=key;
  legs=DEF[key].legs.map(l=>({kind:l.kind,dir:l.dir,K:l.K,qty:l.qty}));
  syncGallery(); renderLegs(); render();
}

/* ----- 矩阵选型 ----- */
function updateMatrix(){
  const rec=MX[mView+'|'+mIV]; const box=document.getElementById('reco'); const d=DEF[rec.k];
  box.innerHTML='<div class="rk">推荐 · '+mView+' × IV '+mIV+'</div>'+
    '<div class="rn">'+d.en+' · '+d.cn+'</div>'+
    '<div class="rd">'+d.note+'</div>'+
    (rec.alt&&rec.alt.length?'<div class="ralt">备选 · <b>'+rec.alt.join('</b> / <b>')+'</b></div>':'');
  loadStrategy(rec.k);
}

/* ----- 腿编辑器 ----- */
function renderLegs(){
  const box=document.getElementById('legs');
  box.innerHTML = legs.map((l,i)=>(
    '<div class="legrow" data-i="'+i+'">'+
      '<select data-f="kind">'+
        '<option value="call"'+(l.kind==='call'?' selected':'')+'>Call</option>'+
        '<option value="put"'+(l.kind==='put'?' selected':'')+'>Put</option>'+
        '<option value="stock"'+(l.kind==='stock'?' selected':'')+'>Stock</option>'+
      '</select>'+
      '<select data-f="dir">'+
        '<option value="1"'+(l.dir>0?' selected':'')+'>Long</option>'+
        '<option value="-1"'+(l.dir<0?' selected':'')+'>Short</option>'+
      '</select>'+
      '<input data-f="K" type="number" step="1" value="'+l.K+'"'+(l.kind==='stock'?' disabled':'')+'>'+
      '<input data-f="qty" type="number" step="1" min="1" value="'+l.qty+'">'+
      '<button class="del" title="删除">✕</button>'+
    '</div>'
  )).join('');
  box.querySelectorAll('.legrow').forEach(rowEl=>{
    const i=+rowEl.dataset.i;
    rowEl.querySelector('[data-f=kind]').addEventListener('change',e=>{
      legs[i].kind=e.target.value; markCustom(); renderLegs(); render();   // 结构变化(stock 禁用 K)→重建
    });
    rowEl.querySelector('[data-f=dir]').addEventListener('change',e=>{ legs[i].dir=+e.target.value; markCustom(); render(); });
    rowEl.querySelector('[data-f=K]').addEventListener('input',e=>{ legs[i].K=+e.target.value||0; markCustom(); render(); });
    rowEl.querySelector('[data-f=qty]').addEventListener('input',e=>{ legs[i].qty=Math.max(1,+e.target.value||1); markCustom(); render(); });
    rowEl.querySelector('.del').addEventListener('click',()=>{ legs.splice(i,1); markCustom(); renderLegs(); render(); });
  });
}
function markCustom(){ if(curKey!==null){ curKey=null; syncGallery(); } }
document.getElementById('addLeg').addEventListener('click',()=>{
  legs.push({kind:'call',dir:1,K:100,qty:1}); markCustom(); renderLegs(); render();
});

/* ----- 主渲染：曲线 + 指标 ----- */
function render(){
  // 标题区
  if(curKey){ const d=DEF[curKey];
    document.getElementById('sName').textContent=d.en+' · '+d.cn;
    document.getElementById('sView').textContent='观点 · '+d.view;
    document.getElementById('sNote').textContent=d.note;
  }else{
    document.getElementById('sName').textContent='自定义组合 · Custom Combo';
    document.getElementById('sView').textContent='手动编辑的多腿组合';
    document.getElementById('sNote').textContent='权利金按当前 σ / T 实时 Black-Scholes 估算,曲线为到期损益。';
  }

  const priced=legs.map(l=>({...l,entry:premium(l)}));
  const total=S=>priced.reduce((a,l)=>a+l.dir*l.qty*(legVal(l,S)-l.entry),0);

  // 指标：宽区间扫描 + 右端斜率判断无限
  const net=priced.reduce((s,l)=>s - l.dir*l.qty*l.entry, 0);   // +收入 / -成本
  let mx=-Infinity,mn=Infinity,bes=[],pv=total(0),ps=0;
  for(let S=0;S<=300;S+=0.5){
    const c=total(S);
    if(c>mx)mx=c; if(c<mn)mn=c;
    if(S>0 && ((pv<0&&c>=0)||(pv>0&&c<=0))) bes.push(ps+(0-pv)/(c-pv)*0.5);
    pv=c; ps=S;
  }
  const rSlope=total(300)-total(299);
  const mp = rSlope>0.01 ? '+∞' : '+'+O.fmt(mx,2);
  const ml = rSlope<-0.01 ? '−∞' : O.fmt(mn,2);
  document.getElementById('mNet').innerHTML='<span style="color:'+(net>=0?'var(--up)':'var(--text)')+'">'+(net>=0?'+':'')+O.fmt(net,2)+'</span>';
  document.getElementById('mBe').textContent = bes.length?bes.map(x=>O.fmt(x,1)).join(' / '):'—';
  document.getElementById('mMp').textContent = legs.length?mp:'—';
  document.getElementById('mMl').textContent = legs.length?ml:'—';

  // 图表
  const a=55,b=145, pts=O.sample(a,b,240,total);
  const vl=[{x:S0,color:'#7c6df2',label:'S₀',dash:[3,3]}];
  const seen={};
  priced.filter(l=>l.kind!=='stock').forEach(l=>{ if(seen[l.K])return; seen[l.K]=1;
    vl.push({x:l.K,color:l.kind==='call'?'rgba(90,162,255,.5)':'rgba(255,180,84,.5)',label:'K'+l.K,dash:[2,3]}); });
  const wrap=document.querySelector('.chart-wrap');
  O.chart(cv,{height:Math.max(220,wrap.clientHeight),xmin:a,xmax:b,baseline:0,
    xlabel:'到期标的价 S_T',ylabel:'组合损益',
    series:[{points:pts,color:'#a78bfa',width:2.6,fill:'rgba(167,139,250,0.10)'}], vlines:vl});
}

/* ----- 控件接线 ----- */
O.seg('mView',v=>{mView=v;updateMatrix();});
O.seg('mIV',v=>{mIV=v;updateMatrix();});
O.slider('rV','vV',v=>v+'%',v=>{V=v/100;render();});
O.slider('rT','vT',v=>v+' 天',v=>{T=v;render();});
O.onResize(render);

updateMatrix();   // 初始：强烈看涨 × IV低 → Long Call
</script>
</body>
</html>
