<script>
const pages=['delta','gamma','theta','vega','rho'];
const key=pages.includes((location.pathname.split('/').pop()||'delta.html').replace('.html',''))?(location.pathname.split('/').pop()||'delta.html').replace('.html',''):'delta';
const DATA={
delta:{name:'Delta · Δ',title:'Delta – Sensitivity to Underlying Price',sub:'Sensitivity to Underlying Price',color:'--call',range:[0,1],unit:'',formula:'<span class="hl">Call Delta</span> = sigmoid((S-K)/w)<br><span class="hl">Put Delta</span> = Call Delta - 1',lede:'Delta 衡量期权价格对标的资产价格 S 的敏感度。直觉上，它回答：标的上涨 1 元时，期权价格大约会变化多少。',conceptTitle:'方向暴露与价格敏感度',conceptBody:'对 Call，Delta 通常在 0 到 1；对 Put，Delta 通常在 -1 到 0。Delta 越接近绝对值 1，说明期权越像标的资产本身。',note:'Delta 也常被粗略理解为到期 ITM 概率：Call Delta 约 0.65，可近似理解为约 65% 的 ITM 概率。它是直觉工具，不是保证。',rows:[['Deep ITM Call','Delta 接近 1'],['ATM','Delta 变化最快'],['Deep OTM Call','Delta 接近 0']],quiz:'Call 的 Delta = 0.70，最接近表示什么？',right:'标的上涨 1 元，Call 价格大约上涨 0.70 元；也可粗略理解为约 70% 的 ITM 概率。',wrong:'Call 价格固定上涨 70 元，且一定会 ITM。'},
gamma:{name:'Gamma · Γ',title:'Gamma – Speed of Delta Change',sub:'Speed of Delta Change',color:'--gold',range:[0,.05],unit:'',formula:'<span class="hl">Gamma</span> = Delta 曲线的斜率<br>本页用 sigmoid 的导数模拟 Gamma',lede:'Gamma 衡量 Delta 对标的资产价格 S 的敏感度。它回答：标的变化后，Delta 本身会改变多快。',conceptTitle:'Delta 的加速度',conceptBody:'Gamma 通常在 ATM 附近最大，因为标的价格接近行权价时，期权从 OTM 变成 ITM 的概率变化最快。',note:'高 Gamma 代表方向暴露会迅速变化。短期期权在 ATM 附近常有更高 Gamma，因此风险调整更频繁。',rows:[['ATM','Gamma 最高'],['Deep ITM/OTM','Gamma 较低'],['临近到期','ATM Gamma 更尖锐']],quiz:'哪个位置通常 Gamma 最大？',right:'ATM 附近。因为 S 接近 K 时，Delta 对标的价格变化最敏感。',wrong:'Deep ITM。此时期权已经很像标的，Delta 变化反而较慢。'},
theta:{name:'Theta · Θ',title:'Theta – Time Decay',sub:'Time Decay',color:'--down',range:[-.12,0],unit:'/日',formula:'<span class="hl">Theta</span> ≈ - 时间价值 / 剩余天数<br>本页用时间价值衰减模拟每日损耗',lede:'Theta 衡量期权价格对时间流逝的敏感度。它回答：其他条件不变时，每过一天期权大约损失多少时间价值。',conceptTitle:'时间价值的消耗速度',conceptBody:'买入期权通常是负 Theta，因为时间流逝会侵蚀时间价值；卖出期权通常受益于时间衰减。',note:'Theta 不是线性钟表。越接近到期，ATM 期权的时间价值衰减通常越明显。',rows:[['买入期权','通常负 Theta'],['ATM','时间价值最明显'],['临近到期','衰减更快']],quiz:'买入 ATM Call 时，Theta 通常意味着什么？',right:'其他条件不变，每过一天期权价格会因时间价值减少而下降。',wrong:'每过一天 Delta 一定增加。Theta 描述时间价值，不是方向敏感度。'},
vega:{name:'Vega · ν',title:'Vega – Sensitivity to Volatility',sub:'Sensitivity to Volatility',color:'--put',range:[0,.35],unit:'/1%',formula:'<span class="hl">Vega</span> ≈ 价格对 σ 的敏感度<br>本页用 bell curve 模拟 IV 上升 1% 的影响',lede:'Vega 衡量期权价格对波动率 σ 的敏感度。它回答：IV 上升 1%，期权价格大约变化多少。',conceptTitle:'波动率暴露',conceptBody:'买入 Call 或 Put 通常都是正 Vega：市场预期波动变大，期权更贵。Vega 在 ATM、期限较长时通常更明显。',note:'Vega 与方向不同。即使你不知道涨跌，只要波动率上升，买入期权可能受益。',rows:[['买入期权','通常正 Vega'],['ATM','Vega 较高'],['期限更长','Vega 通常更高']],quiz:'IV 上升时，买入期权的 Vega 通常带来什么影响？',right:'买入期权通常正 Vega，IV 上升会推高期权价值。',wrong:'Vega 会让 Call 只在上涨时赚钱。Vega 描述波动率，不是方向。'},
rho:{name:'Rho · ρ',title:'Rho – Sensitivity to Interest Rate',sub:'Sensitivity to Interest Rate',color:'--up',range:[-.25,.25],unit:'/1%',formula:'<span class="hl">Rho</span> ≈ 价格对 r 的敏感度<br>本页用期限与 moneyness 模拟利率影响',lede:'Rho 衡量期权价格对无风险利率 r 的敏感度。它回答：利率上升 1%，期权价格大约变化多少。',conceptTitle:'利率敏感度',conceptBody:'Call 的 Rho 通常为正，Put 的 Rho 通常为负。对短期期权，Rho 往往比 Delta、Gamma、Vega 更不显眼。',note:'Rho 在长期期权和利率剧烈变化时更值得关注；在很多短线场景里，它不是主导风险。',rows:[['Call','Rho 通常为正'],['Put','Rho 通常为负'],['长期期权','Rho 更明显']],quiz:'利率上升时，Call 的 Rho 通常是什么方向？',right:'Call 的 Rho 通常为正，利率上升会提高 Call 价值。',wrong:'Call 的 Rho 通常固定为 0。短期期权影响小，但不代表没有。'}
};
const d=DATA[key],K=100;
function $(id){return document.getElementById(id)}function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}function sigmoid(x){return 1/(1+Math.exp(-x))}function vals(s,t,v,r,type){const c=sigmoid((s-K)/9),delta=type==='call'?c:c-1,gamma=c*(1-c)/9*(45/(45+t)),atm=Math.exp(-Math.pow((s-K)/22,2)),time=Math.sqrt(t/365),vega=.32*atm*time,theta=-(.018+0.12*atm)/(Math.sqrt(t)+.7),rho=(type==='call'?1:-1)*(t/365)*(.06+.18*c),price=Math.max(type==='call'?s-K:K-s,0)+(8*atm*time*v/30);return{delta,gamma,theta,vega,rho,price}}function metric(o){return o[key]}function money(s,type){if(Math.abs(s-K)<=3)return'ATM';return type==='call'?(s>K?'ITM':'OTM'):(s<K?'ITM':'OTM')}function fmt(x){return x.toFixed(key==='gamma'||key==='vega'?4:3)}
function init(){document.title=d.title+' | 期权学堂';$('title').innerHTML=d.title+'<span class="en">'+d.name+'</span>';$('lede').textContent=d.lede;$('conceptTitle').textContent=d.conceptTitle;$('conceptBody').textContent=d.conceptBody;$('probNote').textContent=d.note;$('formula').innerHTML=d.formula;$('mainKey').textContent=d.name.toUpperCase();$('legendText').textContent=d.name+' 随标的价 S 的变化';$('legendLine').style.background=css(d.color);$('mainVal').style.color=css(d.color);$('intuitionTable').innerHTML='<tr><th>场景</th><th>直觉</th></tr>'+d.rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('');$('quizQ').textContent=d.quiz;$('cards').innerHTML='<div class="dcard" draggable="true" data-ok="true">'+d.right+'</div><div class="dcard" draggable="true" data-ok="false">'+d.wrong+'</div><button class="btn" type="button" id="reset">重置测试</button>';const i=pages.indexOf(key),prev=pages[(i+pages.length-1)%pages.length],next=pages[(i+1)%pages.length];$('prevLink').href=prev+'.html';$('nextLink').href=next+'.html';$('prevText').textContent=DATA[prev].name;$('nextText').textContent=DATA[next].name;bindCards();render()}
function draw(o){const cv=$('cv'),ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,rect=cv.getBoundingClientRect();cv.width=Math.max(1,rect.width*dpr);cv.height=320*dpr;cv.style.height='320px';ctx.setTransform(dpr,0,0,dpr,0,0);const w=rect.width,h=320,L=50,R=16,T=18,B=38,PW=w-L-R,PH=h-T-B,ymin=d.range[0],ymax=d.range[1],X=x=>L+(x-60)/80*PW,Y=y=>T+PH-(y-ymin)/(ymax-ymin)*PH;ctx.clearRect(0,0,w,h);ctx.fillStyle=css('--bg2');ctx.fillRect(0,0,w,h);ctx.strokeStyle=css('--border');ctx.fillStyle=css('--muted');ctx.font='12px JetBrains Mono, Consolas, monospace';for(let i=0;i<=4;i++){const y=ymin+(ymax-ymin)*i/4,py=Y(y);ctx.beginPath();ctx.moveTo(L,py);ctx.lineTo(L+PW,py);ctx.stroke();ctx.fillText(y.toFixed(2),8,py+4)}for(let s=60;s<=140;s+=20){const px=X(s);ctx.beginPath();ctx.moveTo(px,T);ctx.lineTo(px,T+PH);ctx.stroke();ctx.fillText(String(s),px-9,h-14)}ctx.strokeStyle=css(d.color);ctx.lineWidth=3;ctx.beginPath();for(let s=60;s<=140;s+=.5){const y=metric(vals(s,o.t,o.v,o.r,o.type)),px=X(s),py=Y(y);if(s===60)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.stroke();const cx=X(o.s),cy=Y(metric(vals(o.s,o.t,o.v,o.r,o.type)));ctx.strokeStyle=css('--gold');ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,T);ctx.lineTo(cx,T+PH);ctx.stroke();ctx.fillStyle=css('--gold');ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fill();ctx.fillStyle=css('--text');ctx.fillText('S='+o.s+'  '+key+'='+fmt(metric(vals(o.s,o.t,o.v,o.r,o.type))),Math.min(cx+10,w-185),Math.max(T+16,cy-12))}
function render(){const o={s:+$('rS').value,t:+$('rT').value,v:+$('rV').value,r:+$('rR').value,type:$('optType').value};$('vS').textContent=o.s;$('vT').textContent=o.t;$('vV').textContent=o.v+'%';$('vR').textContent=o.r.toFixed(1)+'%';$('vType').textContent=o.type==='call'?'Call':'Put';const all=vals(o.s,o.t,o.v,o.r,o.type);$('mainVal').textContent=fmt(metric(all))+d.unit;$('moneyVal').textContent=money(o.s,o.type);$('priceVal').textContent=all.price.toFixed(2);draw(o)}
function bindCards(){let drag=null;document.querySelectorAll('.dcard').forEach(c=>c.addEventListener('dragstart',()=>{drag=c}));const drop=$('drop');drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});drop.addEventListener('dragleave',()=>drop.classList.remove('over'));drop.addEventListener('drop',e=>{e.preventDefault();if(!drag)return;const ok=drag.dataset.ok==='true';drop.className='drop '+(ok?'ok':'no');$('quizA').textContent=ok?'正确。'+d.right:'还不对。'+d.wrong;drag.classList.add('used');drag.draggable=false});$('reset').addEventListener('click',()=>{drop.className='drop';$('quizA').textContent='把正确卡片拖到这里。';document.querySelectorAll('.dcard').forEach(c=>{c.classList.remove('used');c.draggable=true})})}
['rS','rT','rV','rR','optType'].forEach(id=>$(id).addEventListener('input',render));window.addEventListener('resize',render);init();
</script>
